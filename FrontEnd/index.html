<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROSITA - Assistente Escolar</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>ROSITA</h1>
      <p class="subtitle">Assistente Escolar — PEI Rosa Bonfiglioli</p>
      <div
        id="status"
        class="status status--offline"
        role="status"
        aria-live="polite"
      >
        Verificando…
      </div>
    </header>

    <main class="main">
      <div id="chat-container" class="chat-container" aria-label="Mensagens do chat"></div>

      <div class="input-row">
        <label class="sr-only" for="user-input">Sua pergunta</label>
        <input
          type="text"
          id="user-input"
          class="user-input"
          placeholder="Digite sua pergunta…"
          maxlength="1000"
          autocomplete="off"
        />
        <button type="button" id="send-btn" class="btn btn-send" title="Enviar">
          Enviar 🚀
        </button>
        <button type="button" id="clear-btn" class="btn btn-clear" title="Limpar conversa">
          Limpar 🗑️
        </button>
      </div>
    </main>
  </div>

  <script src="scripts/api_client.js"></script>
  <script src="scripts/main.js"></script>
</body>
</html>
